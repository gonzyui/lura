services:
  lura:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lura
    restart: unless-stopped
    depends_on:
      - redis
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - DISCORD_TOKEN
      - SUPABASE_URL
      - SUPABASE_SERVICE_ROLE_KEY
      - WELCOME_CHANNEL

  redis:
    image: redis:7-alpine
    container_name: lura-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

volumes:
  redis_data: